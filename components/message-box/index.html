<div class="mob-message-box" ng-if="$ctrl.isShow" ng-class="{'is-show':$ctrl.isWrapperShow, 'is-closing':$ctrl.isClosing}" ng-style="{'z-index': $ctrl.zIndex}">
    <!-- 遮罩层：不设 z-index，由 DOM 顺序保证在 __wrapper 之下 -->
    <div class="mob-message-box__modal"
         ng-click="$ctrl.handleModalClick()">
    </div>

    <!-- 消息框主体 -->
    <div class="mob-message-box__wrapper"
         ng-class="{'is-closing':$ctrl.isClosing, 'mob-message-box__wrapper--status': $ctrl.options.iconType}"
    >

        <!-- 头部 -->
        <div class="mob-message-box__header" ng-if="$ctrl.options" ng-class="{'mob-message-box__header--icon': $ctrl.options.iconType}">
            <!-- 带 iconType 时：居中大图标布局 -->
            <div ng-if="$ctrl.options.iconType" class="mob-message-box__status-icon"
                 ng-class="'mob-message-box__status-icon--' + $ctrl.options.iconType">
                <mob-icon-circle-check-filled ng-if="$ctrl.options.iconType == 'success'"></mob-icon-circle-check-filled>
                <mob-icon-warning-filled ng-if="$ctrl.options.iconType == 'warning'"></mob-icon-warning-filled>
                <mob-icon-circle-close-filled ng-if="$ctrl.options.iconType == 'error'"></mob-icon-circle-close-filled>
            </div>
            <!-- 普通标题行 -->
            <div class="mob-message-box__title" ng-class="{'mob-message-box__title--center': $ctrl.options.iconType}">
                <i class="mob-message-box__icon"
                   ng-class="$ctrl.getIconClass()"
                   ng-if="!$ctrl.options.iconType && ($ctrl.options.type !== 'info' || $ctrl.options.title)">
                </i>
                <span ng-bind="$ctrl.options.title"></span>
            </div>
            <button class="mob-message-box__close"
                    ng-if="$ctrl.options.showClose"
                    ng-disabled="$ctrl.cancelButtonLoading || $ctrl.confirmButtonLoading "
                    ng-click="$ctrl.handleCancel()">
                <mob-icon-close></mob-icon-close>
            </button>
        </div>

        <!-- 内容区域 -->
        <form name="promptForm" novalidate>
        <div class="mob-message-box__content">
            <div class="mob-message-box__message" ng-if="$ctrl.options.message" ng-class="{'mob-message-box__message--center': $ctrl.options.iconType}">
                <i class="mob-message-box__icon"
                   ng-class="$ctrl.getIconClass()"
                   ng-if="!$ctrl.options.iconType && ($ctrl.options.type !== 'info' && !$ctrl.options.title)">
                </i>
                <div class="mob-message-box__message-text" ng-bind="$ctrl.options.message"></div>
            </div>
            <div class="mob-message-box__message" ng-if="$ctrl.options.inputConfig">
                <div class="mob-message-box__message__form">
                    <mob-input name="prompt" ng-model="$ctrl.options.inputConfig.model" ng-pattern="$ctrl.options.inputConfig.pattern"></mob-input>
                </div>
                <p class="invalid_msg" ng-if="promptForm.$invalid">输入内容不合法</p>
            </div>
        </div>

        <!-- 底部按鈕区域 -->
        <div class="mob-message-box__btns" ng-if="$ctrl.options.showConfirmButton || $ctrl.options.showCancelButton" ng-class="{'mob-message-box__btns--center': $ctrl.options.iconType}">
            <mob-button
                    loading="$ctrl.cancelButtonLoading"
                    ng-if="$ctrl.options.showCancelButton"
                    type="$ctrl.options.cancelButtonType"
                    ng-disabled="promptForm.$invalid || $ctrl.cancelButtonLoading "
                    ng-click="$ctrl.handleCancel()">
                {{$ctrl.options.cancelButtonText}}
            </mob-button>
            <mob-button
                    loading="$ctrl.confirmButtonLoading"
                    ng-if="$ctrl.options.showConfirmButton"
                    type="$ctrl.options.confirmButtonType"
                    ng-disabled="promptForm.$invalid || $ctrl.confirmButtonLoading "
                    ng-click="$ctrl.handleConfirm()">
                {{$ctrl.options.confirmButtonText}}
            </mob-button>
        </div>
        </form>
    </div>
</div>
